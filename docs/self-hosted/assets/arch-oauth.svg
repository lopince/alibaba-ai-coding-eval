<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Inter,system-ui,sans-serif">
  <defs>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#78706A"/>
    </marker>
    <marker id="arr-l" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#78706A"/>
    </marker>
  </defs>

  <!-- Lifeline headers -->
  <rect x="50" y="10" width="170" height="45" rx="5" fill="#f0f7ed" stroke="#788C5D" stroke-width="1.5"/>
  <text x="135" y="38" text-anchor="middle" font-size="13" font-weight="700" fill="#141413">Developer Laptop</text>

  <rect x="365" y="10" width="170" height="45" rx="5" fill="#fef9ee" stroke="#c77b00" stroke-width="1.5"/>
  <text x="450" y="38" text-anchor="middle" font-size="13" font-weight="700" fill="#141413">Amazon Cognito</text>

  <rect x="680" y="10" width="170" height="45" rx="5" fill="#edf2f7" stroke="#6A8CAF" stroke-width="1.5"/>
  <text x="765" y="38" text-anchor="middle" font-size="13" font-weight="700" fill="#141413">LiteLLM (Fargate)</text>

  <!-- Lifelines -->
  <line x1="135" y1="55" x2="135" y2="385" stroke="#B5AFA8" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="450" y1="55" x2="450" y2="385" stroke="#B5AFA8" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="765" y1="55" x2="765" y2="385" stroke="#B5AFA8" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Phase 1: Auth flow -->
  <rect x="10" y="70" width="880" height="120" rx="0" fill="rgba(120,140,93,.04)"/>
  <text x="18" y="84" font-size="9" font-weight="600" fill="#788C5D" letter-spacing=".06em">AUTHENTICATION</text>

  <!-- 1. Login -->
  <line x1="135" y1="100" x2="442" y2="100" stroke="#788C5D" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <rect x="210" y="88" width="160" height="18" rx="3" fill="#f0f7ed"/>
  <text x="290" y="101" text-anchor="middle" font-size="11" font-weight="500" fill="#5a6b45">1. Login (browser)</text>

  <!-- 2. Auth code -->
  <line x1="450" y1="130" x2="143" y2="130" stroke="#788C5D" stroke-width="1.5" marker-end="url(#arr-l)"/>
  <rect x="210" y="118" width="160" height="18" rx="3" fill="#f0f7ed"/>
  <text x="290" y="131" text-anchor="middle" font-size="11" font-weight="500" fill="#5a6b45">2. Auth code</text>

  <!-- 3. Exchange -->
  <line x1="135" y1="158" x2="442" y2="158" stroke="#788C5D" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <rect x="210" y="146" width="160" height="18" rx="3" fill="#f0f7ed"/>
  <text x="290" y="159" text-anchor="middle" font-size="11" font-weight="500" fill="#5a6b45">3. Exchange for JWT</text>

  <!-- 4. Access token -->
  <line x1="450" y1="183" x2="143" y2="183" stroke="#788C5D" stroke-width="1.5" marker-end="url(#arr-l)"/>
  <rect x="210" y="171" width="160" height="18" rx="3" fill="#f0f7ed"/>
  <text x="290" y="184" text-anchor="middle" font-size="11" font-weight="500" fill="#5a6b45">4. Access token (1hr)</text>

  <!-- Phase 2: API call -->
  <rect x="10" y="205" width="880" height="170" rx="0" fill="rgba(106,140,175,.04)"/>
  <text x="18" y="219" font-size="9" font-weight="600" fill="#6A8CAF" letter-spacing=".06em">INFERENCE REQUEST</text>

  <!-- 5. POST request -->
  <line x1="135" y1="240" x2="757" y2="240" stroke="#D97757" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <rect x="300" y="228" width="310" height="18" rx="3" fill="#fef3ed"/>
  <text x="455" y="241" text-anchor="middle" font-size="11" font-weight="500" fill="#D97757">5. POST /v1/chat/completions (Bearer JWT)</text>

  <!-- 6-8. Processing steps on LiteLLM side -->
  <rect x="700" y="258" width="170" height="56" rx="4" fill="#edf2f7" stroke="#6A8CAF" stroke-width=".5"/>
  <text x="715" y="274" font-size="10" fill="#6A8CAF">6. Validate JWT signature</text>
  <text x="715" y="289" font-size="10" fill="#6A8CAF">7. Check DynamoDB perms</text>
  <text x="715" y="304" font-size="10" fill="#6A8CAF">8. Forward to SageMaker</text>

  <!-- 9. Response -->
  <line x1="765" y1="340" x2="143" y2="340" stroke="#788C5D" stroke-width="1.5" marker-end="url(#arr-l)"/>
  <rect x="340" y="328" width="230" height="18" rx="3" fill="#f0f7ed"/>
  <text x="455" y="341" text-anchor="middle" font-size="11" font-weight="500" fill="#5a6b45">9. Streaming response (tokens)</text>

  <!-- Footer note -->
  <text x="450" y="395" text-anchor="middle" font-size="10" fill="#B5AFA8">Tokens are short-lived (1hr). Refresh via Cognito without re-authentication.</text>
</svg>
