<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="Inter,system-ui,sans-serif">
  <defs>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#78706A"/>
    </marker>
    <marker id="arr-l" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#78706A"/>
    </marker>
  </defs>

  <!-- AWS Cloud box -->
  <rect x="25" y="15" width="370" height="310" rx="8" fill="#edf2f7" stroke="#6A8CAF" stroke-width="1.5"/>
  <text x="210" y="38" text-anchor="middle" font-size="11" font-weight="700" fill="#6A8CAF" letter-spacing=".06em">AWS SAGEMAKER / EC2</text>

  <!-- LLM box -->
  <rect x="45" y="52" width="330" height="145" rx="5" fill="#fff" stroke="#6A8CAF" stroke-width=".75"/>
  <text x="210" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#141413">Coding LLM</text>
  <text x="210" y="90" text-anchor="middle" font-size="10" fill="#78706A">Qwen3-Coder / DeepSeek-V4</text>
  <line x1="60" y1="98" x2="360" y2="98" stroke="#E3DACC" stroke-width=".75"/>

  <!-- JSON example -->
  <rect x="60" y="108" width="300" height="78" rx="4" fill="#1C1C1A"/>
  <text x="72" y="126" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="11" fill="#788C5D">{</text>
  <text x="84" y="142" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="11" fill="#D97757">"tool"</text>
  <text x="120" y="142" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="11" fill="#B5AFA8">: </text>
  <text x="132" y="142" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="11" fill="#788C5D">"read_file"</text>
  <text x="84" y="158" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="11" fill="#D97757">"path"</text>
  <text x="120" y="158" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="11" fill="#B5AFA8">: </text>
  <text x="132" y="158" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="11" fill="#788C5D">"src/main.py"</text>
  <text x="84" y="174" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="11" fill="#D97757">"lines"</text>
  <text x="126" y="174" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="11" fill="#B5AFA8">: </text>
  <text x="138" y="174" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="11" fill="#6A8CAF">[1, 50]</text>
  <text x="72" y="182" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="11" fill="#788C5D">}</text>

  <!-- LLM consumes result -->
  <rect x="45" y="215" width="330" height="50" rx="5" fill="#fff" stroke="#6A8CAF" stroke-width=".75"/>
  <text x="210" y="237" text-anchor="middle" font-size="11" font-weight="500" fill="#141413">LLM consumes tool result</text>
  <text x="210" y="254" text-anchor="middle" font-size="11" fill="#78706A">Generates code changes / suggestions</text>

  <!-- Arrow down inside AWS -->
  <line x1="210" y1="197" x2="210" y2="215" stroke="#B5AFA8" stroke-width="1" marker-end="url(#arr-r)"/>

  <!-- Engineer Laptop box -->
  <rect x="505" y="15" width="370" height="310" rx="8" fill="#f0f7ed" stroke="#788C5D" stroke-width="1.5"/>
  <text x="690" y="38" text-anchor="middle" font-size="11" font-weight="700" fill="#5a6b45" letter-spacing=".06em">ENGINEER'S LAPTOP</text>

  <!-- MCP Client -->
  <rect x="525" y="52" width="330" height="55" rx="5" fill="#fff" stroke="#788C5D" stroke-width=".75"/>
  <text x="690" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#141413">MCP Client</text>
  <text x="690" y="92" text-anchor="middle" font-size="11" fill="#78706A">OpenCode / Cursor / Qoder CLI</text>

  <!-- Arrow down -->
  <line x1="690" y1="107" x2="690" y2="125" stroke="#B5AFA8" stroke-width="1" marker-end="url(#arr-r)"/>

  <!-- MCP Server -->
  <rect x="525" y="125" width="330" height="110" rx="5" fill="#fff" stroke="#788C5D" stroke-width=".75"/>
  <text x="690" y="146" text-anchor="middle" font-size="13" font-weight="600" fill="#141413">MCP Server (local)</text>
  <line x1="540" y1="154" x2="840" y2="154" stroke="#E3DACC" stroke-width=".75"/>
  <text x="610" y="172" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="11" fill="#788C5D">read_file()</text>
  <text x="610" y="189" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="11" fill="#788C5D">write_file()</text>
  <text x="750" y="172" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="11" fill="#788C5D">run_terminal()</text>
  <text x="750" y="189" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="11" fill="#788C5D">git_status()</text>
  <text x="690" y="215" text-anchor="middle" font-size="10" fill="#78706A">Executes tool calls locally on the laptop</text>

  <!-- Arrow down -->
  <line x1="690" y1="235" x2="690" y2="253" stroke="#B5AFA8" stroke-width="1" marker-end="url(#arr-r)"/>

  <!-- User approval -->
  <rect x="525" y="253" width="330" height="50" rx="5" fill="#fff" stroke="#788C5D" stroke-width="1.5"/>
  <text x="690" y="273" text-anchor="middle" font-size="12" font-weight="600" fill="#5a6b45">User Approval Gate</text>
  <text x="690" y="292" text-anchor="middle" font-size="11" font-style="italic" fill="#788C5D">"Allow editing src/main.py?" [Y/n]</text>

  <!-- Cross-zone arrows -->
  <!-- Tool call: AWS → Laptop (right) -->
  <line x1="395" y1="145" x2="525" y2="145" stroke="#D97757" stroke-width="2" marker-end="url(#arr-r)"/>
  <rect x="412" y="130" width="96" height="18" rx="3" fill="#fef3ed"/>
  <text x="460" y="143" text-anchor="middle" font-size="10" font-weight="600" fill="#D97757">HTTPS / SSE</text>
  <text x="460" y="162" text-anchor="middle" font-size="9" fill="#78706A">outbound only</text>

  <!-- Tool result: Laptop → AWS (left) -->
  <line x1="525" y1="200" x2="395" y2="200" stroke="#6A8CAF" stroke-width="2" marker-end="url(#arr-l)"/>
  <rect x="412" y="186" width="96" height="18" rx="3" fill="#edf2f7"/>
  <text x="460" y="199" text-anchor="middle" font-size="10" font-weight="600" fill="#6A8CAF">Tool result</text>
</svg>
