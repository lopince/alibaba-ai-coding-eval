description: Long-Horizon SDLC LLM-as-Judge evaluation

prompts:
  - file://prompts/candidate_artifact.txt

providers:
  - id: echo
    label: candidate-artifact

defaultTest:
  threshold: 0.65
  assert:
    - type: contains
      value: "{{required_id}}"
      metric: required_id_present
      weight: 0
    - type: not-contains
      value: "TBD"
      metric: no_placeholders
      weight: 0
    - type: llm-rubric
      provider: openai:gpt-4.1-mini
      metric: context_retention
      weight: 30
      value: |
        Judge only Context Retention for this SDLC artifact.

        Pass if the candidate preserves the important requirements, constraints,
        decisions, assumptions, and required identifiers from the source context,
        prior artifact, and Claude baseline. Fail if it drops important context,
        changes constraints, invents unsupported requirements, or loses required
        ID {{required_id}}.

        Case ID: {{case_id}}
        Stage: {{stage}}
        Requirement context:
        {{requirement_context}}
        Prior artifact:
        {{prior_artifact}}
        Claude baseline:
        {{claude_baseline}}
        Candidate artifact:
        {{candidate_artifact}}
    - type: llm-rubric
      provider: openai:gpt-4.1-mini
      metric: stage_completion
      weight: 30
      value: |
        Judge only Stage Completion for this SDLC artifact.

        Pass if the candidate produces the expected deliverable for stage
        "{{stage}}" and is complete enough for the workflow to move to the next
        stage. Fail if it is incomplete, stage-inappropriate, mostly generic, or
        missing the core deliverable content expected for this stage.

        Case ID: {{case_id}}
        Stage: {{stage}}
        Requirement context:
        {{requirement_context}}
        Claude baseline:
        {{claude_baseline}}
        Candidate artifact:
        {{candidate_artifact}}
    - type: llm-rubric
      provider: openai:gpt-4.1-mini
      metric: workflow_continuity
      weight: 25
      value: |
        Judge only Workflow Continuity for this SDLC artifact.

        Pass if the candidate continues logically from the prior artifact and
        Claude baseline, keeps decisions consistent, and advances the project
        without restarting, drifting, or contradicting earlier work. Fail if it
        ignores prior decisions, changes direction without reason, or creates
        contradictions that would break the SDLC chain.

        Case ID: {{case_id}}
        Stage: {{stage}}
        Prior artifact:
        {{prior_artifact}}
        Claude baseline:
        {{claude_baseline}}
        Candidate artifact:
        {{candidate_artifact}}
    - type: llm-rubric
      provider: openai:gpt-4.1-mini
      metric: reviewability
      weight: 15
      value: |
        Judge only Reviewability for this SDLC artifact.

        Pass if a human reviewer can efficiently inspect, approve, or correct
        the artifact. The output should be clear, structured, specific, and free
        of vague placeholders. Fail if it is hard to review, ambiguous,
        unstructured, or contains unresolved placeholders.

        Case ID: {{case_id}}
        Stage: {{stage}}
        Candidate artifact:
        {{candidate_artifact}}

tests: file://tests/sdlc_cases.yaml
