<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Inter,system-ui,sans-serif">
  <!-- VPC outer -->
  <rect x="15" y="10" width="870" height="560" rx="10" fill="#fef9ee" stroke="#c77b00" stroke-width="2"/>
  <text x="30" y="35" font-size="13" font-weight="700" fill="#c77b00">VPC: 10.0.0.0/16</text>

  <!-- Public Subnet -->
  <rect x="40" y="55" width="820" height="100" rx="6" fill="#fff" stroke="#D97757" stroke-width="1.5"/>
  <rect x="50" y="60" width="120" height="18" rx="3" fill="rgba(217,119,87,.1)"/>
  <text x="55" y="73" font-size="10" font-weight="700" fill="#D97757">PUBLIC SUBNET</text>
  <text x="180" y="73" font-size="10" fill="#78706A">10.0.1.0/24</text>

  <!-- ALB -->
  <rect x="60" y="85" width="370" height="55" rx="4" fill="#fef3ed" stroke="#D97757" stroke-width=".5"/>
  <text x="245" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="#141413">Application Load Balancer</text>
  <text x="245" y="122" text-anchor="middle" font-size="10" fill="#78706A">Internet-facing · TLS termination</text>

  <!-- NAT Gateway -->
  <rect x="460" y="85" width="380" height="55" rx="4" fill="#fef3ed" stroke="#D97757" stroke-width=".5"/>
  <text x="650" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="#141413">NAT Gateway</text>
  <text x="650" y="122" text-anchor="middle" font-size="10" fill="#78706A">Fargate outbound updates · Docker pulls</text>

  <!-- Arrow: Public → Private Gateway -->
  <line x1="450" y1="155" x2="450" y2="175" stroke="#B5AFA8" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Private Subnet: Gateway -->
  <rect x="40" y="175" width="820" height="105" rx="6" fill="#fff" stroke="#6A8CAF" stroke-width="1.5"/>
  <rect x="50" y="180" width="200" height="18" rx="3" fill="rgba(106,140,175,.1)"/>
  <text x="55" y="193" font-size="10" font-weight="700" fill="#6A8CAF">PRIVATE SUBNET (GATEWAY)</text>
  <text x="260" y="193" font-size="10" fill="#78706A">10.0.2.0/24</text>

  <rect x="60" y="205" width="780" height="60" rx="4" fill="#edf2f7" stroke="#6A8CAF" stroke-width=".5"/>
  <text x="450" y="226" text-anchor="middle" font-size="12" font-weight="600" fill="#141413">ECS Fargate: LiteLLM Proxy</text>
  <text x="450" y="243" text-anchor="middle" font-size="10" fill="#78706A">No public IP  ·  Outbound: NAT Gateway (Docker pulls)  ·  Inbound: ALB only (port 4000)</text>
  <text x="450" y="258" text-anchor="middle" font-size="10" fill="#6A8CAF">JWT validation · API key lookup · Rate limiting · Cost tracking</text>

  <!-- Arrow: Gateway → Inference -->
  <line x1="450" y1="280" x2="450" y2="300" stroke="#B5AFA8" stroke-width="1.2"/>

  <!-- Private Subnet: Inference -->
  <rect x="40" y="300" width="820" height="110" rx="6" fill="#fff" stroke="#6A8CAF" stroke-width="1.5"/>
  <rect x="50" y="305" width="210" height="18" rx="3" fill="rgba(106,140,175,.1)"/>
  <text x="55" y="318" font-size="10" font-weight="700" fill="#6A8CAF">PRIVATE SUBNET (INFERENCE)</text>
  <text x="270" y="318" font-size="10" fill="#78706A">10.0.3.0/24</text>

  <rect x="60" y="330" width="780" height="65" rx="4" fill="#edf2f7" stroke="#6A8CAF" stroke-width=".5"/>
  <text x="450" y="351" text-anchor="middle" font-size="12" font-weight="600" fill="#141413">SageMaker Endpoint / EC2 GPU Instances</text>
  <text x="450" y="368" text-anchor="middle" font-size="10" fill="#78706A">No public IP  ·  No NAT gateway  ·  Inbound: Fargate SG only (port 8000)</text>
  <text x="450" y="383" text-anchor="middle" font-size="10" fill="#78706A">Outbound: S3 VPC endpoint only (model weight download)</text>

  <!-- Private Subnet: Data -->
  <rect x="40" y="430" width="820" height="90" rx="6" fill="#fff" stroke="#788C5D" stroke-width="1.5"/>
  <rect x="50" y="435" width="175" height="18" rx="3" fill="rgba(120,140,93,.1)"/>
  <text x="55" y="448" font-size="10" font-weight="700" fill="#5a6b45">PRIVATE SUBNET (DATA)</text>
  <text x="235" y="448" font-size="10" fill="#78706A">10.0.4.0/24</text>

  <!-- Data service boxes -->
  <rect x="60" y="462" width="180" height="42" rx="4" fill="#f0f7ed" stroke="#788C5D" stroke-width=".5"/>
  <text x="150" y="480" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">DynamoDB</text>
  <text x="150" y="496" text-anchor="middle" font-size="9" fill="#78706A">VPC endpoint</text>

  <rect x="260" y="462" width="180" height="42" rx="4" fill="#f0f7ed" stroke="#788C5D" stroke-width=".5"/>
  <text x="350" y="480" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">Amazon S3</text>
  <text x="350" y="496" text-anchor="middle" font-size="9" fill="#78706A">VPC gateway endpoint</text>

  <rect x="460" y="462" width="180" height="42" rx="4" fill="#f0f7ed" stroke="#788C5D" stroke-width=".5"/>
  <text x="550" y="480" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">ElastiCache Redis</text>
  <text x="550" y="496" text-anchor="middle" font-size="9" fill="#78706A">LiteLLM caching</text>

  <rect x="660" y="462" width="180" height="42" rx="4" fill="#f0f7ed" stroke="#788C5D" stroke-width=".5"/>
  <text x="750" y="480" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">Secrets Manager</text>
  <text x="750" y="496" text-anchor="middle" font-size="9" fill="#78706A">API keys / tokens</text>

  <!-- VPC Endpoints list -->
  <rect x="40" y="535" width="820" height="28" rx="4" fill="rgba(199,123,0,.06)" stroke="#c77b00" stroke-width=".5"/>
  <text x="55" y="554" font-size="10" font-weight="600" fill="#c77b00">VPC Endpoints:</text>
  <text x="170" y="554" font-size="10" fill="#78706A">s3 (gw)</text>
  <text x="230" y="554" font-size="10" fill="#78706A">dynamodb (gw)</text>
  <text x="340" y="554" font-size="10" fill="#78706A">ssm (iface)</text>
  <text x="435" y="554" font-size="10" fill="#78706A">ecr.api (iface)</text>
  <text x="545" y="554" font-size="10" fill="#78706A">ecr.dkr (iface)</text>
  <text x="650" y="554" font-size="10" fill="#78706A">cognito-idp (iface)</text>
  <text x="790" y="554" font-size="10" fill="#78706A">logs (iface)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#B5AFA8"/>
    </marker>
  </defs>
</svg>
